name: CI - MenteMX Pro

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Validação de commits semânticos
  commit-lint:
    name: 🔍 Validar Commits Semânticos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar Conventional Commits
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json

  # Testes do pacote core
  test-core:
    name: 🧪 Testes - @mentemx/core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/MenteMX-Pro-App
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/MenteMX-Pro-App/package-lock.json

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Rodar testes do core
        run: npm run test:core

  # Testes do backend
  test-backend:
    name: 🧪 Testes - @mentemx/backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/MenteMX-Pro-App
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/MenteMX-Pro-App/package-lock.json

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Rodar testes do backend
        run: npm run test --workspace=apps/backend --if-present

  # Build check
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [test-core, test-backend]
    defaults:
      run:
        working-directory: src/MenteMX-Pro-App
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/MenteMX-Pro-App/package-lock.json

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Build core
        run: npm run build --workspace=packages/core
